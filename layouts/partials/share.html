<div class="post-share">
  <span class="share-label">[share]</span>
  <a href="https://twitter.com/intent/tweet?text={{ .Title | urlquery }}&url={{ .Permalink | urlquery }}" target="_blank" rel="noopener" title="Share on X">[x]</a>
  <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink | urlquery }}" target="_blank" rel="noopener" title="Share on LinkedIn">[linkedin]</a>
  <a href="mailto:?subject={{ .Title | urlquery }}&body={{ .Permalink | urlquery }}" title="Share via Email">[email]</a>
  <a href="javascript:navigator.clipboard.writeText('{{ .Permalink }}').then(()=>alert('Link copied!'))" title="Copy link">[copy]</a>
</div>

<style>
.post-share {
  margin-top: 2rem;
  padding-top: 1rem;
  border-top: 1px dashed var(--accent);
  font-family: monospace;
}
.post-share a {
  margin-left: 0.5rem;
  color: var(--accent);
  text-decoration: none;
}
.post-share a:hover {
  text-decoration: underline;
}
.share-label {
  color: var(--accent);
}
</style>
