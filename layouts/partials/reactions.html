<div class="post-reactions" id="reactions">
  <button class="reaction-btn" data-emoji="heart" title="Love it">
    <span class="emoji">❤️</span><span class="count" id="count-heart">0</span>
  </button>
  <button class="reaction-btn" data-emoji="fire" title="Fire">
    <span class="emoji">🔥</span><span class="count" id="count-fire">0</span>
  </button>
  <button class="reaction-btn" data-emoji="robot" title="Robot approved">
    <span class="emoji">🤖</span><span class="count" id="count-robot">0</span>
  </button>
</div>

<style>
.post-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
  flex-wrap: wrap;
}

.post-header .post-title {
  margin: 0;
  flex: 1;
}

.post-reactions {
  font-family: monospace;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-shrink: 0;
}

.reaction-btn {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 0.2rem 0.4rem;
  cursor: pointer;
  font-family: monospace;
  font-size: 0.85rem;
  display: inline-flex;
  align-items: center;
  gap: 0.2rem;
  transition: background 0.2s, transform 0.1s;
}

.reaction-btn:hover {
  background: var(--accent);
  color: var(--background);
}

.reaction-btn:active {
  transform: scale(0.95);
}

.reaction-btn.reacted {
  background: var(--accent);
  color: var(--background);
}

.reaction-btn .emoji {
  font-size: 0.95rem;
}

.reaction-btn .count {
  font-size: 0.8rem;
}

@media (max-width: 600px) {
  .post-header {
    flex-direction: column;
  }
  .post-reactions {
    margin-top: 0.5rem;
  }
}
</style>

<script>
(function() {
  const API_BASE = '/api/reactions';
  const postSlug = window.location.pathname.split('/').filter(Boolean).pop();
  const storageKey = `reactions:${postSlug}`;

  function getReacted() {
    try {
      return JSON.parse(localStorage.getItem(storageKey)) || [];
    } catch {
      return [];
    }
  }

  function setReacted(emoji) {
    const reacted = getReacted();
    if (!reacted.includes(emoji)) {
      reacted.push(emoji);
      localStorage.setItem(storageKey, JSON.stringify(reacted));
    }
  }

  async function fetchCounts() {
    try {
      const res = await fetch(`${API_BASE}?post=${encodeURIComponent(postSlug)}`);
      if (res.ok) {
        const counts = await res.json();
        for (const [emoji, count] of Object.entries(counts)) {
          const el = document.getElementById(`count-${emoji}`);
          if (el) el.textContent = count;
        }
      }
    } catch (e) {
      console.error('Failed to fetch reactions:', e);
    }
  }

  function markReacted() {
    const reacted = getReacted();
    document.querySelectorAll('.reaction-btn').forEach(btn => {
      if (reacted.includes(btn.dataset.emoji)) {
        btn.classList.add('reacted');
      }
    });
  }

  async function handleReaction(e) {
    const btn = e.currentTarget;
    const emoji = btn.dataset.emoji;
    
    if (getReacted().includes(emoji)) {
      return;
    }

    try {
      const res = await fetch(`${API_BASE}?post=${encodeURIComponent(postSlug)}&emoji=${emoji}`, {
        method: 'POST',
      });
      if (res.ok) {
        const data = await res.json();
        document.getElementById(`count-${emoji}`).textContent = data.count;
        btn.classList.add('reacted');
        setReacted(emoji);
      }
    } catch (e) {
      console.error('Failed to send reaction:', e);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    fetchCounts();
    markReacted();
    document.querySelectorAll('.reaction-btn').forEach(btn => {
      btn.addEventListener('click', handleReaction);
    });
  });
})();
</script>
